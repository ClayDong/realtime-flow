# Cloudflare Tunnel 配置文件模板
#
# 使用前请替换以下占位符：
#   <TUNNEL-UUID>      你的 Tunnel UUID（执行 `cloudflared tunnel create` 后获得）
#   <YOUR-DOMAIN>      你的域名（如 example.com）
#   <YOUR-SUBDOMAIN>   你的子域名（如 stock.example.com）
#   <YOUR-HOME>        你的 home 目录路径（如 /Users/yourname）
#
# 部署步骤：
# 1. 将此文件复制到 ~/.cloudflared/config.yml
# 2. 替换所有占位符为实际值
# 3. 运行: cloudflared tunnel run realtime-flow
#
# 或者直接运行: bash start-tunnel.sh setup（自动生成）

tunnel: <TUNNEL-UUID>
credentials-file: <YOUR-HOME>/.cloudflared/<TUNNEL-UUID>.json

# 日志配置
loglevel: info
transport-loglevel: warn

# 入站规则
ingress:
  # 主域名映射到本地 8899 端口
  - hostname: <YOUR-SUBDOMAIN>
    service: http://localhost:8899

  # 可选：根域名也映射（方便直接访问根域名）
  - hostname: <YOUR-DOMAIN>
    service: http://localhost:8899

  # 兜底规则（必须放在最后）
  - service: http_status:404
