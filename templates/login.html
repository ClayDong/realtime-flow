<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · Realtime-Flow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .login-title {
            text-align: center;
            margin-bottom: 8px;
            font-size: 22px;
            font-weight: 600;
            color: #58a6ff;
        }
        .login-subtitle {
            text-align: center;
            margin-bottom: 28px;
            font-size: 13px;
            color: #8b949e;
        }
        .form-group { margin-bottom: 18px; }
        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #8b949e;
        }
        .form-input {
            width: 100%;
            padding: 10px 14px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
        }
        .btn-login {
            width: 100%;
            padding: 11px;
            background: #238636;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #2ea043; }
        .btn-login:active { background: #1a7f37; }
        .btn-login:disabled { background: #238636; opacity: 0.6; cursor: not-allowed; }
        .alert-error {
            background: rgba(248,81,73,0.1);
            border: 1px solid rgba(248,81,73,0.4);
            color: #f85149;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 18px;
            display: none;
        }
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: #484f58;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-title">Realtime-Flow</div>
        <div class="login-subtitle">A股资金流监测系统</div>

        <div class="alert-error" id="error-msg"></div>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label" for="username">用户名</label>
                <input type="text" id="username" class="form-input" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">密码</label>
                <input type="password" id="password" class="form-input" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login" id="btn-login">登 录</button>
        </form>

        <div class="login-footer">© 2026 Realtime-Flow · 本地访问无需登录</div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const errEl = document.getElementById('error-msg');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.textContent = '登录中...';
            errEl.style.display = 'none';

            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password}),
                });

                if (resp.ok) {
                    // 登录成功，跳转到首页
                    const params = new URLSearchParams(window.location.search);
                    const redirect = params.get('redirect') || '/';
                    window.location.href = redirect;
                } else {
                    const data = await resp.json();
                    errEl.textContent = data.detail || '登录失败';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = '登 录';
                }
            } catch (err) {
                errEl.textContent = '网络错误: ' + err.message;
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        });
    </script>
</body>
</html>
